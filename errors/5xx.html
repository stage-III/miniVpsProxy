<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Service Unavailable</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-weight: 300;
      background: #111;
      color: #ccc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .content {
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: 4rem;
      font-weight: 200;
      color: #fff;
      margin-bottom: 1rem;
    }
    p { font-size: 1rem; color: #888; }
  </style>
</head>
<body>
  <div class="content">
    <h1>Service Unavailable</h1>
    <p>The server is temporarily unavailable. Please try again shortly.</p>
  </div>
</body>
</html>
