server {
    listen 80;
    server_name little-room.co.uk www.little-room.co.uk;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name little-room.co.uk www.little-room.co.uk;

    ssl_certificate     /etc/letsencrypt/live/little-room.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/little-room.co.uk/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    resolver 127.0.0.11 valid=10s;

    error_page 502 503 504 /5xx.html;
    location = /5xx.html {
        root /usr/share/nginx/errors;
        internal;
    }

    location /api/ {
        set $upstream http://littleroom-backend:8000;
        proxy_pass         $upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /waynesworld/ {
        client_max_body_size 20M;
        set $upstream http://littleroom-backend:8000;
        proxy_pass         $upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /media/ {
        set $upstream http://littleroom-backend:8000;
        proxy_pass         $upstream;
        proxy_set_header   Host              $host;
    }

    location /static/ {
        set $upstream http://littleroom-backend:8000;
        proxy_pass         $upstream;
        proxy_set_header   Host              $host;
    }

    location / {
        set $upstream http://littleroom-frontend:80;
        proxy_pass         $upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
